<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Office Viewer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #1e1e1e; color: #e0e0e0; font-family: system-ui, -apple-system, sans-serif; }
  #loading { display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; }
  #loading .spinner { font-size: 15px; color: #888; }
  #error { display: none; align-items: center; justify-content: center; width: 100%; height: 100%; }
  #error .msg { text-align: center; max-width: 420px; padding: 32px; }
  #error .msg .icon { font-size: 48px; margin-bottom: 16px; }
  #error .msg .title { font-size: 15px; font-weight: 600; margin-bottom: 8px; }
  #error .msg .detail { font-size: 13px; color: #999; line-height: 1.6; }

  /* docx container */
  #docx-container { width: 100%; height: 100%; overflow: auto; display: none; background: #fff; }
  #docx-container .docx-wrapper { padding: 20px; }

  /* xlsx container */
  #xlsx-container { width: 100%; height: 100%; overflow: auto; display: none; background: #fff; color: #222; font-size: 13px; }
  #xlsx-tabs { display: flex; gap: 0; background: #f0f0f0; border-bottom: 1px solid #ccc; padding: 0 8px; overflow-x: auto; flex-shrink: 0; }
  #xlsx-tabs button { padding: 6px 16px; border: none; background: transparent; cursor: pointer; font-size: 12px; color: #555; border-bottom: 2px solid transparent; white-space: nowrap; }
  #xlsx-tabs button.active { color: #1d9bf0; border-bottom-color: #1d9bf0; font-weight: 600; }
  #xlsx-table-wrap { overflow: auto; flex: 1; }
  #xlsx-table-wrap table { border-collapse: collapse; width: max-content; min-width: 100%; }
  #xlsx-table-wrap th, #xlsx-table-wrap td { border: 1px solid #ddd; padding: 4px 8px; text-align: left; white-space: nowrap; font-size: 12px; }
  #xlsx-table-wrap th { background: #f5f5f5; font-weight: 600; position: sticky; top: 0; z-index: 1; }
  #xlsx-table-wrap tr:nth-child(even) { background: #fafafa; }

  /* pptx container */
  #pptx-container { width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; background: #2a2a2a; }
  #pptx-canvas-wrap { flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; width: 100%; }
  #pptx-canvas { max-width: 100%; max-height: 100%; }
  #pptx-nav { display: flex; align-items: center; gap: 12px; padding: 10px 16px; background: #1e1e1e; width: 100%; justify-content: center; }
  #pptx-nav button { padding: 6px 16px; border: none; border-radius: 4px; background: #333; color: #e0e0e0; cursor: pointer; font-size: 13px; }
  #pptx-nav button:hover { background: #444; }
  #pptx-nav button:disabled { opacity: 0.3; cursor: default; }
  #pptx-nav .status { font-size: 13px; color: #999; min-width: 80px; text-align: center; }
</style>
</head>
<body>
<div id="loading"><div class="spinner">Loading document…</div></div>
<div id="error"><div class="msg"><div class="icon">⚠️</div><div class="title" id="err-title">Error</div><div class="detail" id="err-detail"></div></div></div>
<div id="docx-container"></div>
<div id="xlsx-container" style="display:none;flex-direction:column"><div id="xlsx-tabs"></div><div id="xlsx-table-wrap"></div></div>
<div id="pptx-container"><div id="pptx-canvas-wrap"><canvas id="pptx-canvas"></canvas></div><div id="pptx-nav"><button id="pptx-prev">◀ Prev</button><span class="status" id="pptx-status">–</span><button id="pptx-next">Next ▶</button></div></div>

<script src="jszip.min.js"></script>
<script src="docx-preview.min.js"></script>
<script src="xlsx.full.min.js"></script>
<script src="PptxViewJS.min.js"></script>
<script>
(function() {
  const params = new URLSearchParams(location.search);
  const url = params.get('url');
  const name = params.get('name') || 'document';

  if (!url) return showError('No document URL', 'Pass ?url=... to load a document.');

  const ext = (name.match(/\.[^.]+$/) || [''])[0].toLowerCase();

  fetch(url)
    .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.arrayBuffer(); })
    .then(buf => render(ext, buf))
    .catch(err => showError('Failed to load', err.message));

  function render(ext, buf) {
    document.getElementById('loading').style.display = 'none';
    if (['.docx', '.doc', '.odt', '.rtf'].includes(ext)) return renderDocx(buf);
    if (['.xlsx', '.xls', '.ods', '.csv'].includes(ext)) return renderXlsx(buf, ext);
    if (['.pptx', '.ppt', '.odp'].includes(ext)) return renderPptx(buf);
    showError('Unsupported format', 'File type ' + ext + ' is not supported.');
  }

  function renderDocx(buf) {
    const el = document.getElementById('docx-container');
    el.style.display = 'block';
    docx.renderAsync(buf, el, null, {
      className: 'docx',
      inWrapper: true,
      ignoreWidth: false,
      ignoreHeight: false,
      ignoreFonts: false,
      breakPages: true,
      ignoreLastRenderedPageBreak: true,
      experimental: true,
    }).catch(err => showError('DOCX render failed', err.message));
  }

  function renderXlsx(buf, ext) {
    const container = document.getElementById('xlsx-container');
    container.style.display = 'flex';
    let wb;
    try {
      wb = XLSX.read(buf, { type: 'array' });
    } catch(err) {
      showError('Spreadsheet parse failed', err.message);
      return;
    }
    const tabBar = document.getElementById('xlsx-tabs');
    const tableWrap = document.getElementById('xlsx-table-wrap');

    function showSheet(sheetName) {
      const ws = wb.Sheets[sheetName];
      if (!ws) return;
      const html = XLSX.utils.sheet_to_html(ws, { editable: false });
      tableWrap.innerHTML = html;
      // style the generated table
      const tbl = tableWrap.querySelector('table');
      if (tbl) { tbl.style.borderCollapse = 'collapse'; tbl.style.width = 'max-content'; tbl.style.minWidth = '100%'; }
      tableWrap.querySelectorAll('td,th').forEach(cell => {
        cell.style.border = '1px solid #ddd';
        cell.style.padding = '4px 8px';
        cell.style.fontSize = '12px';
        cell.style.whiteSpace = 'nowrap';
      });
      tableWrap.querySelectorAll('th').forEach(th => {
        th.style.background = '#f5f5f5';
        th.style.fontWeight = '600';
        th.style.position = 'sticky';
        th.style.top = '0';
      });
      // update active tab
      tabBar.querySelectorAll('button').forEach(b => b.classList.toggle('active', b.textContent === sheetName));
    }

    wb.SheetNames.forEach((sn, i) => {
      const btn = document.createElement('button');
      btn.textContent = sn;
      btn.addEventListener('click', () => showSheet(sn));
      if (i === 0) btn.className = 'active';
      tabBar.appendChild(btn);
    });

    if (wb.SheetNames.length > 0) showSheet(wb.SheetNames[0]);
  }

  function renderPptx(buf) {
    const container = document.getElementById('pptx-container');
    container.style.display = 'flex';
    const canvas = document.getElementById('pptx-canvas');
    const status = document.getElementById('pptx-status');
    const prevBtn = document.getElementById('pptx-prev');
    const nextBtn = document.getElementById('pptx-next');

    const PPTXViewer = window.PptxViewJS?.PPTXViewer;
    if (!PPTXViewer) { showError('PPTX library not loaded', 'PptxViewJS failed to initialize.'); return; }

    const viewer = new PPTXViewer({ canvas: canvas });
    const blob = new Blob([buf], { type: 'application/vnd.openxmlformats-officedocument.presentationml.presentation' });
    const file = new File([blob], name, { type: blob.type });

    viewer.loadFile(file).then(() => {
      viewer.render();
      updateNav();
    }).catch(err => showError('PPTX render failed', err.message));

    function updateNav() {
      const cur = viewer.getCurrentSlideIndex() + 1;
      const total = viewer.getSlideCount();
      status.textContent = cur + ' / ' + total;
      prevBtn.disabled = cur <= 1;
      nextBtn.disabled = cur >= total;
    }

    prevBtn.addEventListener('click', () => { viewer.previousSlide().then(() => { viewer.render(); updateNav(); }); });
    nextBtn.addEventListener('click', () => { viewer.nextSlide().then(() => { viewer.render(); updateNav(); }); });
  }

  function showError(title, detail) {
    document.getElementById('loading').style.display = 'none';
    const el = document.getElementById('error');
    el.style.display = 'flex';
    document.getElementById('err-title').textContent = title;
    document.getElementById('err-detail').textContent = detail || '';
  }
})();
</script>
</body>
</html>
